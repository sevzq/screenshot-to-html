<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tesla — Charging (iOS)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1c1d1d;          /* matches the cropped car background exactly */
    --card:#242527;
    --ink:#f4f5f5;
    --muted:#8b8d8f;
    --faint:#6c6e70;
    --green:#3ad26a;
    --line:#36383a;
    --ring:#3ad26a;
    --screen-w:393px;
    --screen-h:852px;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  html{ scroll-behavior:smooth; }
  body{
    background:radial-gradient(120% 80% at 50% 0%, #2a2c30 0%, #161719 60%, #0e0f10 100%);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
    -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
    min-height:100vh; display:flex; justify-content:center; align-items:center; padding:30px 0;
  }
  a{ color:inherit; text-decoration:none; }
  button{ font-family:inherit; }

  .ix{ cursor:pointer; transition:background-color .14s ease, color .14s ease, opacity .14s ease, transform .1s ease; }
  .ix:focus-visible{ outline:2px solid var(--ring); outline-offset:2px; }
  .ix:active{ transform:scale(.96); opacity:.85; }
  @media (prefers-reduced-motion: reduce){ html{ scroll-behavior:auto; } .ix{ transition:none; } }

  /* iPhone frame (decorative) */
  .device{ position:relative; padding:11px; background:#0b0b0d; border-radius:54px;
    box-shadow:0 0 0 1.5px #2a2a2e, 0 26px 60px -18px rgba(0,0,0,.7), 0 10px 24px rgba(0,0,0,.4); }
  .island{ position:absolute; top:23px; left:50%; transform:translateX(-50%);
    width:122px; height:34px; background:#000; border-radius:19px; z-index:60; }
  .screen{ position:relative; width:var(--screen-w); height:var(--screen-h);
    background:var(--bg); overflow:hidden; border-radius:43px; color:var(--ink); }

  /* Status bar */
  .statusbar{ height:54px; display:flex; align-items:flex-end; justify-content:space-between; padding:0 30px 9px; }
  .statusbar .t{ display:flex; align-items:center; gap:7px; font-size:16px; font-weight:600; letter-spacing:.02em; }
  .statusbar .r{ display:flex; align-items:center; gap:7px; }

  .app{ padding:4px 22px 0; }

  /* Header */
  .head{ display:flex; align-items:center; justify-content:space-between; padding-top:8px; }
  .car-name{ display:inline-flex; align-items:center; gap:8px; background:none; border:0; color:var(--ink); font-size:26px; font-weight:600; letter-spacing:-0.01em; padding:0; }
  .head-actions{ display:flex; align-items:center; gap:14px; }
  .icon-btn{ background:none; border:0; color:var(--ink); display:grid; place-items:center; width:30px; height:30px; border-radius:9px; }
  .icon-btn:hover{ background:#2c2e30; }

  .batt{ display:flex; align-items:center; gap:9px; margin-top:14px; }
  .batt .glyph{ position:relative; width:26px; height:13px; border:1.6px solid #6f7173; border-radius:3px; }
  .batt .glyph::after{ content:""; position:absolute; right:-4px; top:3px; width:2.4px; height:5px; background:#6f7173; border-radius:0 1px 1px 0; }
  .batt .glyph i{ position:absolute; left:1.4px; top:1.4px; bottom:1.4px; width:58%; background:var(--green); border-radius:1px; }
  .batt .pct{ color:var(--green); font-size:16px; font-weight:600; }
  .batt .bolt{ color:var(--green); display:flex; }
  .remain{ margin:8px 0 0; color:var(--muted); font-size:14.5px; }

  /* Car */
  .car{ display:block; width:112%; margin:6px -6% -6px; height:auto; }

  /* Quick controls */
  .controls{ display:flex; justify-content:space-around; align-items:center; padding:6px 6px 16px; }
  .ctrl{ background:none; border:0; color:#9a9c9e; display:grid; place-items:center; width:50px; height:46px; border-radius:14px; }
  .ctrl:hover{ background:#2a2c2e; color:#cfd1d3; }
  .ctrl.active{ color:var(--green); }

  /* Charge card */
  .card{ background:var(--card); border-radius:18px; padding:18px 18px 16px; }
  .card h2{ margin:0; font-size:16px; font-weight:600; }
  .card h2 .sub{ color:var(--muted); font-weight:500; }
  .metrics{ margin:7px 0 0; color:var(--muted); font-size:14px; }
  .slider{ -webkit-appearance:none; appearance:none; width:100%; height:6px; margin:18px 0 4px; border-radius:99px;
    background:linear-gradient(90deg, var(--green) var(--val,62%), #3a3c3e var(--val,62%)); }
  .slider::-webkit-slider-thumb{ -webkit-appearance:none; appearance:none; width:20px; height:20px; border-radius:50%; background:#fff; box-shadow:0 1px 4px rgba(0,0,0,.5); cursor:pointer; }
  .slider::-moz-range-thumb{ width:20px; height:20px; border:0; border-radius:50%; background:#fff; cursor:pointer; }

  .tip{ display:flex; align-items:center; gap:11px; margin-top:16px; }
  .tip .i{ flex:0 0 auto; width:21px; height:21px; border-radius:50%; background:var(--green); color:#0c2414; display:grid; place-items:center; font-size:13px; font-weight:700; font-style:italic; }
  .tip h3{ margin:1px 0 4px; color:var(--green); font-size:14.5px; font-weight:600; }
  .tip p{ margin:0; color:var(--muted); font-size:14px; line-height:1.45; }

  .stepper{ display:flex; align-items:center; justify-content:space-between; margin-top:16px; background:#303133; border-radius:12px; padding:4px; }
  .stepper button{ background:none; border:0; color:#cfd1d3; width:46px; height:38px; display:grid; place-items:center; border-radius:9px; }
  .stepper button:hover{ background:#3c3e40; }
  .stepper .val{ font-size:16px; font-weight:600; }

  .card-actions{ display:grid; grid-template-columns:1fr 1fr; margin-top:14px; border-top:1px solid var(--line); }
  .card-actions button{ background:none; border:0; color:var(--ink); font-size:15px; font-weight:500; padding:15px 6px 4px; }
  .card-actions button:first-child{ border-right:1px solid var(--line); }
  .card-actions button:hover{ color:var(--green); }

  /* Controls sheet peek */
  .sheet{ width:100%; background:none; border:0; border-top:1px solid var(--line); color:var(--ink); text-align:left; display:flex; align-items:center; gap:12px; padding:18px 22px; }
  .sheet:hover{ background:#202224; }
  .sheet .label{ display:flex; align-items:center; gap:12px; font-size:22px; font-weight:600; }
  .sheet .chev{ margin-left:auto; color:var(--faint); }
</style>
</head>
<body>
  <div class="device">
    <div class="island"></div>
    <div class="screen">
      <div class="statusbar">
        <span class="t">9:41
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M21 3 3 10.5l7 2.5 2.5 7L21 3Z"/></svg>
        </span>
        <span class="r">
          <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4.5" width="3" height="7.5" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
          <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor"><path d="M8.5 11.5 1 4a10.6 10.6 0 0 1 15 0L8.5 11.5Z" opacity=".95"/></svg>
          <svg width="26" height="13" viewBox="0 0 26 13" fill="none"><rect x=".7" y=".7" width="21.6" height="11.6" rx="3" stroke="currentColor" stroke-opacity=".5" stroke-width="1.2"/><rect x="2.4" y="2.4" width="16.5" height="8.2" rx="1.6" fill="currentColor"/><rect x="23.6" y="4" width="1.8" height="5" rx=".9" fill="currentColor" fill-opacity=".5"/></svg>
        </span>
      </div>

      <main class="app">
        <header class="head">
          <button class="car-name ix" type="button">Blackstar
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="head-actions">
            <button class="icon-btn ix" type="button" aria-label="Messages">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 11.5a8.5 8 0 0 1-12 7.3L4 20l1.3-4A8 8 0 1 1 21 11.5Z"/><circle cx="8.5" cy="11.5" r="1" fill="currentColor"/><circle cx="12" cy="11.5" r="1" fill="currentColor"/><circle cx="15.5" cy="11.5" r="1" fill="currentColor"/></svg>
            </button>
            <button class="icon-btn ix" type="button" aria-label="Menu">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
          </div>
        </header>

        <div class="batt">
          <span class="glyph"><i></i></span>
          <span class="pct">61%</span>
          <span class="bolt"><svg width="13" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8Z"/></svg></span>
        </div>
        <p class="remain">2h 15m remaining to charge limit</p>

        <img class="car" src="assets/car.png" alt="Tesla Model 3 charging">

        <div class="controls">
          <button class="ctrl ix" type="button" aria-label="Lock">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
          </button>
          <button class="ctrl ix" type="button" aria-label="Climate">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c0-5 1-9 0-9-2.5 0-5 2-5 4.5S9.5 12 12 12Zm0 0c5 0 9 1 9 0 0-2.5-2-5-4.5-5S12 9.5 12 12Zm0 0c0 5-1 9 0 9 2.5 0 5-2 5-4.5S14.5 12 12 12Zm0 0c-5 0-9-1-9 0 0 2.5 2 5 4.5 5S12 14.5 12 12Z"/><circle cx="12" cy="12" r="1.6" fill="#1c1d1d"/></svg>
          </button>
          <button class="ctrl active ix" type="button" aria-label="Charging">
            <svg width="22" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8Z"/></svg>
          </button>
          <button class="ctrl ix" type="button" aria-label="Frunk">
            <svg width="26" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 16l2-5a3 3 0 0 1 2.8-2H14l4 3 3 1v3"/><circle cx="7.5" cy="17" r="1.8"/><circle cx="17.5" cy="17" r="1.8"/></svg>
          </button>
        </div>

        <section class="card" aria-label="Charging">
          <h2>Charge limit: 80% <span class="sub">&middot; Charging</span></h2>
          <p class="metrics">4 kW &middot; +0 kWh &middot; 19/32A &middot; 242V</p>
          <input class="slider" type="range" min="0" max="100" value="62" aria-label="Charge limit">
          <div class="tip">
            <span class="i">i</span>
            <div>
              <h3>Charge Tip</h3>
              <p>To maintain battery health, keep the charge limit at 100% and charge fully once per week</p>
            </div>
          </div>
          <div class="stepper">
            <button class="ix" type="button" aria-label="Decrease amps"><svg width="11" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><polyline points="15 6 9 12 15 18"/></svg></button>
            <span class="val">19 A</span>
            <button class="ix" type="button" aria-label="Increase amps"><svg width="11" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><polyline points="9 6 15 12 9 18"/></svg></button>
          </div>
          <div class="card-actions">
            <button class="ix" type="button">Stop Charging</button>
            <button class="ix" type="button">Unlock Charge Port</button>
          </div>
        </section>
      </main>

      <button class="sheet ix" type="button">
        <span class="label">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 14l1.6-4.2A3 3 0 0 1 7.4 8h9.2a3 3 0 0 1 2.8 1.8L21 14v4h-3v-2H6v2H3v-4Z"/><circle cx="7.5" cy="15" r="1.4" fill="currentColor"/><circle cx="16.5" cy="15" r="1.4" fill="currentColor"/></svg>
          Controls
        </span>
        <span class="chev"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="9 6 15 12 9 18"/></svg></span>
      </button>
    </div>
  </div>

  <script>
    // Keep the slider's green fill in sync with its value.
    (function(){
      var s = document.querySelector('.slider');
      if(!s) return;
      var sync = function(){ s.style.setProperty('--val', s.value + '%'); };
      s.addEventListener('input', sync); sync();
    })();
  </script>
</body>
</html>
