<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Linear — The product development system for teams and agents</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08090a;
    --text: #f7f8f8;
    --muted: #8a8f98;
    --subhead: #9aa0aa;
    --login: #d4d8de;
    --brand: #5e6ad2;
    --ring: #7c87e8;
    --pad: clamp(20px, 7.6vw, 110px);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }
  a { color: inherit; text-decoration: none; }

  /* Interactive affordances — shared by every control (Phase 4).
     Feedback only: the resting appearance is unchanged. */
  .ix {
    cursor: pointer;
    transition: color .14s ease, background-color .14s ease, opacity .14s ease;
  }
  .ix:focus-visible {
    outline: 2px solid var(--ring);
    outline-offset: 3px;
  }
  .ix:active { opacity: .72; }

  html { scroll-behavior: smooth; }
  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    .ix { transition: none; }
  }

  .shell { max-width: 1440px; margin: 0 auto; padding-inline: var(--pad); }

  /* Top navigation */
  .nav { display: flex; align-items: center; justify-content: space-between; padding-top: 17px; }
  .brand { display: flex; align-items: center; gap: 9px; }
  .brand img { width: 24px; height: 24px; display: block; }
  .brand span { font-size: 17px; font-weight: 500; letter-spacing: -0.02em; }
  .nav-right { display: flex; align-items: center; gap: 21px; }
  .nav-links { display: flex; align-items: center; gap: 17px; }
  .nav-links a { font-size: 13.5px; font-weight: 400; color: var(--muted); }
  .nav-links a:hover { color: var(--text); }
  .brand:hover { opacity: .82; }
  .auth { display: flex; align-items: center; gap: 17px; }
  .login { font-size: 13.5px; color: var(--login); }
  .login:hover { color: var(--text); }
  .signup {
    appearance: none; -webkit-appearance: none;
    border: 0; margin: 0; font-family: inherit;
    background: #f7f8f8; color: #08090a;
    font-size: 13.5px; font-weight: 500;
    padding: 7px 13px; border-radius: 9px;
  }
  .signup:hover { background: #e7e9eb; }

  /* Hero */
  .hero { padding-top: 181px; }
  .headline {
    margin: 0;
    font-size: clamp(30px, 4vw, 52px);
    line-height: 1.12;
    font-weight: 500;
    letter-spacing: -0.024em;
    color: #f7f8f8;
  }
  .hero-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 32px;
    margin-top: 29px;
    flex-wrap: wrap;
  }
  .subhead {
    margin: 0;
    max-width: 610px;
    font-size: 13px;
    line-height: 1.45;
    color: var(--subhead);
  }
  .announce {
    display: flex; align-items: center; gap: 9px;
    font-size: 13px; white-space: nowrap; padding-bottom: 3px;
  }
  .announce .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--brand); }
  .announce b { font-weight: 500; color: #f7f8f8; }
  .announce .url { color: var(--muted); transition: color .14s ease; }
  .announce:hover .url { color: var(--text); }

  /* Product shot (lifted from the source screenshot, bleeds off the fold) */
  .product { margin-top: 64px; margin-inline: -20px; }
  .product img { width: 100%; height: auto; display: block; border-radius: 13px 13px 0 0; }

  @media (max-width: 720px) {
    .hero { padding-top: 96px; }
    .nav-links { display: none; }
    .announce { display: none; }
  }
</style>
</head>
<body>
  <div class="shell">
    <header class="nav">
      <a class="brand ix" href="#" aria-label="Linear — home"><img src="assets/logo.png" alt="Linear"><span>Linear</span></a>
      <nav class="nav-right" aria-label="Primary">
        <div class="nav-links">
          <a class="ix" href="#product">Product</a>
          <a class="ix" href="#">Resources</a>
          <a class="ix" href="#">Customers</a>
          <a class="ix" href="#">Pricing</a>
          <a class="ix" href="#">Now</a>
          <a class="ix" href="#">Contact</a>
        </div>
        <div class="auth">
          <a class="login ix" href="#">Log in</a>
          <button class="signup ix" type="button">Sign up</button>
        </div>
      </nav>
    </header>

    <main>
      <section class="hero">
        <h1 class="headline">The product development<br>system for teams and agents</h1>
        <div class="hero-row">
          <p class="subhead">Purpose-built for planning and building products. Designed for the AI era.</p>
          <a class="announce ix" href="#">
            <span class="dot"></span>
            <b>Issue tracking is dead</b>
            <span class="url">linear.app/next&nbsp;&rarr;</span>
          </a>
        </div>
      </section>

      <div class="product" id="product">
        <img src="assets/app-shot.png" alt="Linear — Faster app launch issue view">
      </div>
    </main>
  </div>

  <script>
    // In-page nav: smooth-scroll to # anchors (honors reduced-motion).
    (function () {
      var reduce = window.matchMedia('(prefers-reduced-motion: reduce)');
      document.querySelectorAll('a[href^="#"]').forEach(function (link) {
        link.addEventListener('click', function (e) {
          var hash = link.getAttribute('href');
          var toTop = (hash === '#' || hash === '#top');
          var target = toTop ? null : document.querySelector(hash);
          if (!toTop && !target) return; // unknown anchor: leave default behavior
          e.preventDefault();
          var behavior = reduce.matches ? 'auto' : 'smooth';
          if (toTop) window.scrollTo({ top: 0, behavior: behavior });
          else target.scrollIntoView({ behavior: behavior, block: 'start' });
        });
      });
    })();
  </script>
</body>
</html>
